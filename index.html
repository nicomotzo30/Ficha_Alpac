<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fichada — Alpac</title>
  <style>
    :root {
      --azul:      #1A2B4A;
      --azul-mid:  #243558;
      --acento:    #E8A020;
      --acento-soft: #F5C96A;
      --fondo:     #F2F4F7;
      --blanco:    #FFFFFF;
      --texto:     #1A2B4A;
      --texto-2:   #5A6A82;
      --verde:     #2A9D5C;
      --rojo:      #C0392B;
      --naranja:   #E06C1A;
      --borde:     #D4DAE6;
      --radio:     14px;
      --radio-sm:  8px;
      --sombra:    0 4px 20px rgba(26,43,74,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--fondo);
      color: var(--texto);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--azul);
      padding: 18px 20px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo {
      font-size: 22px;
      font-weight: 800;
      color: var(--acento);
      letter-spacing: -0.5px;
    }
    header .logo span { color: var(--blanco); }
    header .reloj {
      margin-left: auto;
      text-align: right;
    }
    header .reloj .hora {
      font-size: 20px;
      font-weight: 700;
      color: var(--blanco);
      font-variant-numeric: tabular-nums;
    }
    header .reloj .fecha {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      text-transform: capitalize;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      padding: 20px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── SCREENS ── */
    .screen { display: none; flex-direction: column; gap: 16px; }
    .screen.active { display: flex; }

    /* ── WIFI BANNER ── */
    #wifi-error {
      display: none;
      background: #FEF3CD;
      border: 1px solid #F5C96A;
      border-radius: var(--radio-sm);
      padding: 14px 16px;
      font-size: 13px;
      color: #7A4F00;
      line-height: 1.5;
      text-align: center;
    }
    #wifi-error.visible { display: block; }

    /* ── CARD ── */
    .card {
      background: var(--blanco);
      border-radius: var(--radio);
      box-shadow: var(--sombra);
      padding: 20px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--texto-2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }

    /* ── BÚSQUEDA Y LISTA ── */
    .search-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    .search-wrap input {
      width: 100%;
      padding: 12px 16px 12px 40px;
      border: 1.5px solid var(--borde);
      border-radius: var(--radio-sm);
      font-size: 15px;
      background: var(--fondo);
      color: var(--texto);
      outline: none;
      transition: border-color .15s;
    }
    .search-wrap input:focus { border-color: var(--azul); }
    .search-wrap .icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--texto-2);
      font-size: 16px;
    }

    .empleado-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 340px;
      overflow-y: auto;
    }
    .empleado-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1.5px solid var(--borde);
      border-radius: var(--radio-sm);
      background: var(--blanco);
      cursor: pointer;
      text-align: left;
      transition: border-color .15s, background .15s;
      -webkit-appearance: none;
      width: 100%;
    }
    .empleado-btn:active { background: #EFF2F8; border-color: var(--azul); }
    .empleado-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--azul);
      color: var(--acento);
      font-weight: 700;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .empleado-nombre {
      font-size: 15px;
      font-weight: 500;
      color: var(--texto);
    }
    .empleado-arrow {
      margin-left: auto;
      color: var(--borde);
      font-size: 18px;
    }

    /* ── PANTALLA PIN ── */
    .selected-name {
      background: var(--azul);
      border-radius: var(--radio);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .selected-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--acento);
      color: var(--azul);
      font-weight: 800;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .selected-info .nombre {
      font-size: 16px;
      font-weight: 700;
      color: var(--blanco);
    }
    .selected-info .instruccion {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      margin-top: 2px;
    }

    .pin-dots {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin: 8px 0 4px;
    }
    .dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid var(--borde);
      background: transparent;
      transition: background .1s, border-color .1s;
    }
    .dot.filled { background: var(--azul); border-color: var(--azul); }
    .dot.error  { background: var(--rojo); border-color: var(--rojo); }

    .pin-error {
      text-align: center;
      font-size: 13px;
      color: var(--rojo);
      min-height: 18px;
      font-weight: 500;
    }

    /* ── TECLADO NUMÉRICO ── */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 4px;
    }
    .num-btn {
      background: var(--blanco);
      border: 1.5px solid var(--borde);
      border-radius: var(--radio-sm);
      padding: 16px 10px;
      font-size: 22px;
      font-weight: 600;
      color: var(--texto);
      cursor: pointer;
      transition: background .1s, border-color .1s;
      -webkit-appearance: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    .num-btn .sub {
      font-size: 9px;
      font-weight: 400;
      color: var(--texto-2);
      letter-spacing: 0.05em;
    }
    .num-btn:active { background: #EFF2F8; border-color: var(--azul); }
    .num-btn.clear { font-size: 15px; color: var(--texto-2); }
    .num-btn.borrar { font-size: 20px; color: var(--rojo); }
    .num-btn.empty { border: none; background: transparent; pointer-events: none; }

    /* ── BTN VOLVER ── */
    .btn-volver {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--texto-2);
      font-size: 14px;
      cursor: pointer;
      padding: 4px 0;
      -webkit-appearance: none;
    }
    .btn-volver:active { color: var(--azul); }

    /* ── CONFIRMACIÓN ── */
    .confirm-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 8px;
    }
    .confirm-icon.ingreso  { background: #D4F0E3; }
    .confirm-icon.salida-almuerzo { background: #FDE8D0; }
    .confirm-icon.regreso  { background: #D4E8FF; }
    .confirm-icon.egreso   { background: #FFE8D0; }

    .confirm-tipo {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }
    .confirm-tipo.ingreso         { color: var(--verde); }
    .confirm-tipo.salida-almuerzo { color: var(--naranja); }
    .confirm-tipo.regreso         { color: #1A70C8; }
    .confirm-tipo.egreso          { color: var(--naranja); }

    .confirm-nombre {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: var(--texto);
    }
    .confirm-hora {
      text-align: center;
      font-size: 36px;
      font-weight: 800;
      color: var(--azul);
      font-variant-numeric: tabular-nums;
      margin: 4px 0;
    }
    .confirm-fecha {
      text-align: center;
      font-size: 13px;
      color: var(--texto-2);
      text-transform: capitalize;
    }

    .progress-bar {
      height: 4px;
      background: var(--borde);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      background: var(--acento);
      border-radius: 2px;
      width: 0%;
      transition: width linear;
    }

    /* ── SPINNER ── */
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--borde);
      border-top-color: var(--azul);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      text-align: center;
      font-size: 14px;
      color: var(--texto-2);
      margin-top: 10px;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 12px;
      font-size: 11px;
      color: var(--texto-2);
    }
  </style>
</head>

<main>
  <div id="wifi-error" class="wifi-error">
    ⚠️ Solo podés fichar desde la red WiFi de la fábrica.<br>
    Conectate al WiFi e intentá de nuevo.
  </div>

  <!-- PANTALLA 1: Selección de empleado -->
  <div id="screen-empleado" class="screen active">
    <div class="card">
      <div class="card-title">¿Quién sos?</div>
      <div class="search-wrap">
        <span class="icon">🔍</span>
        <input type="text" id="buscar" placeholder="Buscar nombre..." autocomplete="off" />
      </div>
      <div class="empleado-list" id="lista-empleados"></div>
    </div>
  </div>

  <!-- PANTALLA 2: PIN -->
  <div id="screen-pin" class="screen">
    <button class="btn-volver" id="btn-volver">← Volver</button>
    <div class="selected-name">
      <div class="selected-avatar" id="pin-avatar"></div>
      <div class="selected-info">
        <div class="nombre" id="pin-nombre"></div>
        <div class="instruccion">Ingresá tu PIN de 2 dígitos</div>
      </div>
    </div>
    <div class="card">
      <div class="pin-dots">
        <div class="dot" id="d0"></div>
        <div class="dot" id="d1"></div>
      </div>
      <div class="pin-error" id="pin-error"></div>
      <div class="numpad" id="numpad"></div>
    </div>
  </div>

  <!-- PANTALLA 3: Enviando -->
  <div id="screen-loading" class="screen">
    <div class="card" style="padding: 40px 20px; text-align:center;">
      <div class="spinner"></div>
      <div class="loading-text">Registrando fichada...</div>
    </div>
  </div>

  <!-- PANTALLA 4: Confirmación -->
  <div id="screen-confirm" class="screen">
    <div class="card" style="padding: 28px 20px; gap: 6px; display:flex; flex-direction:column;">
      <div class="confirm-icon" id="confirm-icon"></div>
      <div class="confirm-tipo" id="confirm-tipo"></div>
      <div class="confirm-nombre" id="confirm-nombre"></div>
      <div class="confirm-hora" id="confirm-hora"></div>
      <div class="confirm-fecha" id="confirm-fecha"></div>
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    </div>
  </div>

  <!-- PANTALLA 5: Error -->
  <div id="screen-error" class="screen">
    <div class="card" style="padding: 28px 20px; text-align:center;">
      <div style="font-size:48px; margin-bottom:12px;">❌</div>
      <div style="font-size:16px; font-weight:700; color:var(--rojo); margin-bottom:8px;">Error al registrar</div>
      <div style="font-size:14px; color:var(--texto-2); margin-bottom:20px;" id="error-msg"></div>
      <button class="num-btn" style="width:100%; justify-content:center;" onclick="goToEmpleados()">Reintentar</button>
    </div>
  </div>
</main>

  { nombre: "Diego Medina",       pin: "03" },
  { nombre: "Sergio Ochoa",       pin: "01" },
  { nombre: "Gabriel Bustos",     pin: "32" },
  { nombre: "Ciro",               pin: "53" },
  { nombre: "Santiago Polo",      pin: "31" },
  { nombre: "Gabi Perez",         pin: "30" },
  { nombre: "Marcos Perez",       pin: "54" },
];
// ══════════════════════════════════════════════════════

// --- Reloj ---
function actualizarReloj() {
  const now = new Date();
  document.getElementById("hora-display").textContent =
    now.toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  document.getElementById("fecha-display").textContent =
    now.toLocaleDateString("es-AR", { weekday: "long", day: "numeric", month: "long" });
}
actualizarReloj();
setInterval(actualizarReloj, 1000);

// --- Estado ---
let empleadoSeleccionado = null;
let pinIngresado = "";

// --- Pantallas ---
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function goToEmpleados() {
  pinIngresado = "";
  empleadoSeleccionado = null;
  document.getElementById("buscar").value = "";
  renderLista(EMPLEADOS);
  showScreen("screen-empleado");
}

// --- Lista de empleados ---
function iniciales(nombre) {
  const p = nombre.trim().split(" ");
  return (p[0][0] + (p[1] ? p[1][0] : "")).toUpperCase();
}
function renderLista(lista) {
  const cont = document.getElementById("lista-empleados");
  cont.innerHTML = "";
  lista.forEach(emp => {
    const btn = document.createElement("button");
    btn.className = "empleado-btn";
    btn.innerHTML = `
      <div class="empleado-avatar">${iniciales(emp.nombre)}</div>
      <div class="empleado-nombre">${emp.nombre}</div>
      <div class="empleado-arrow">›</div>
    `;
    btn.onclick = () => seleccionarEmpleado(emp);
    cont.appendChild(btn);
  });
}
document.getElementById("buscar").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  renderLista(EMPLEADOS.filter(emp => emp.nombre.toLowerCase().includes(q)));
});
renderLista(EMPLEADOS);

// --- Selección de empleado ---
function seleccionarEmpleado(emp) {
  empleadoSeleccionado = emp;
  pinIngresado = "";
  document.getElementById("pin-avatar").textContent = iniciales(emp.nombre);
  document.getElementById("pin-nombre").textContent = emp.nombre;
  limpiarPin();
  showScreen("screen-pin");
  document.getElementById("pin-error").textContent = "";
}
document.getElementById("btn-volver").onclick = goToEmpleados;

// --- Teclado numérico ---
const teclas = ["1","2","3","4","5","6","7","8","9","limpiar","0","borrar"];
const subLabels = { "2":"ABC","3":"DEF","4":"GHI","5":"JKL","6":"MNO","7":"PQRS","8":"TUV","9":"WXYZ" };
const numpad = document.getElementById("numpad");
teclas.forEach(t => {
  const btn = document.createElement("button");
  btn.className = "num-btn" + (t === "limpiar" ? " clear" : t === "borrar" ? " borrar" : "");
  if (t === "limpiar") btn.textContent = "✕";
  else if (t === "borrar") btn.textContent = "⌫";
  else {
    btn.innerHTML = t + (subLabels[t] ? `<span class="sub">${subLabels[t]}</span>` : "");
  }
  btn.onclick = () => presionarTecla(t);
  numpad.appendChild(btn);
});

function presionarTecla(t) {
  if (t === "limpiar") { pinIngresado = ""; }
  else if (t === "borrar") { pinIngresado = pinIngresado.slice(0, -1); }
  else if (pinIngresado.length < 2) { pinIngresado += t; }
  actualizarDots();
  if (pinIngresado.length === 2) verificarPin();
}

function actualizarDots() {
  for (let i = 0; i < 2; i++) {
    const d = document.getElementById("d" + i);
    d.classList.toggle("filled", i < pinIngresado.length);
    d.classList.remove("error");
  }
}
function limpiarPin() {
  pinIngresado = "";
  actualizarDots();
}

// --- Verificación PIN ---
function verificarPin() {
  if (pinIngresado === empleadoSeleccionado.pin) {
    enviarFichada();
  } else {
    for (let i = 0; i < 2; i++) {
      const d = document.getElementById("d" + i);
      d.classList.add("error");
      d.classList.remove("filled");
    }
    document.getElementById("pin-error").textContent = "PIN incorrecto. Intentá de nuevo.";
    setTimeout(() => {
      limpiarPin();
      document.getElementById("pin-error").textContent = "";
    }, 1200);
  }
}

// --- Envío al Apps Script ---
async function enviarFichada() {
  showScreen("screen-loading");
  const ahora = new Date();
  const payload = {
    nombre:    empleadoSeleccionado.nombre,
    timestamp: ahora.toISOString(),
    fecha:     ahora.toLocaleDateString("es-AR"),
    hora:      ahora.toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit", second: "2-digit" }),
  };

  try {
    const resp = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    if (data.status === "ok") {
      mostrarConfirmacion(data);
    } else {
      mostrarError(data.mensaje || "Error desconocido");
    }
  } catch (e) {
    mostrarError("No se pudo conectar. Verificá tu conexión WiFi.");
  }
}

// --- Confirmación ---
const TIPOS = {
  "Ingreso":         { emoji: "🟢", clase: "ingreso",         label: "Ingreso" },
  "Salida almuerzo": { emoji: "🍽️", clase: "salida-almuerzo", label: "Salida al almuerzo" },
  "Regreso almuerzo":{ emoji: "🔵", clase: "regreso",         label: "Regreso de almuerzo" },
  "Egreso":          { emoji: "🟠", clase: "egreso",          label: "Egreso" },
};

function mostrarConfirmacion(data) {
  const tipo  = TIPOS[data.tipo] || { emoji: "✅", clase: "ingreso", label: data.tipo };
  const ahora = new Date();

  document.getElementById("confirm-icon").textContent = tipo.emoji;
  document.getElementById("confirm-icon").className   = `confirm-icon ${tipo.clase}`;
  document.getElementById("confirm-tipo").textContent = tipo.label;
  document.getElementById("confirm-tipo").className   = `confirm-tipo ${tipo.clase}`;
  document.getElementById("confirm-nombre").textContent = data.nombre || empleadoSeleccionado.nombre;
  document.getElementById("confirm-hora").textContent   =
    ahora.toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" });
  document.getElementById("confirm-fecha").textContent  =
    ahora.toLocaleDateString("es-AR", { weekday: "long", day: "numeric", month: "long" });

  showScreen("screen-confirm");

  // Barra de progreso y vuelta automática en 4s
  const bar = document.getElementById("progress");
  bar.style.transition = "none";
  bar.style.width = "0%";
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.style.transition = "width 4s linear";
      bar.style.width = "100%";
    });
  });
  setTimeout(goToEmpleados, 4000);
}

function mostrarError(msg) {
  document.getElementById("error-msg").textContent = msg;
  showScreen("screen-error");
}
</script>
